# ==========================================
# KyoteOS sysctl configuration
# Optimized for Raspberry Pi (low-memory ARM)
# ==========================================

# Reduce swap aggressiveness (important for SD cards)
vm.swappiness = 10

# Keep filesystem cache longer
vm.vfs_cache_pressure = 50

# Memory handling
vm.overcommit_memory = 1

# Reduce SD card write pressure
vm.dirty_ratio = 20
vm.dirty_background_ratio = 10

# Network safety defaults
net.core.somaxconn = 1024
net.ipv4.tcp_syncookies = 1

# Kernel hardening (safe)
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1

# Enable SysRq for recovery
kernel.sysrq = 176