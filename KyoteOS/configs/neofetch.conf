# ==================================================
# KyoteOS Neofetch Configuration
# Lightweight, Raspberry Pi friendly
# ==================================================

# Print information in this order
print_info() {
    info title
    info underline

    info "OS" distro
    info "Host" model
    info "Kernel" kernel
    info "Uptime" uptime
    info "Packages" packages
    info "Shell" shell
    info "Resolution" resolution
    info "DE" de
    info "WM" wm
    info "Terminal" term
    info "CPU" cpu
    info "GPU" gpu
    info "Memory" memory

    info cols
}

# --------------------------------------------------
# Logo
# --------------------------------------------------

image_backend="ascii"
ascii_distro="custom"
ascii_colors=(1 7)

ascii_custom="
      /\_/\  
     ( o o ) 
      > ^ <  

      KyoteOS
"

# --------------------------------------------------
# Display settings
# --------------------------------------------------

title_fqdn="off"
kernel_shorthand="on"
uptime_shorthand="tiny"
memory_percent="off"
package_managers="on"
shell_path="off"
shell_version="off"
cpu_speed="on"
cpu_cores="logical"
gpu_type="all"

# --------------------------------------------------
# Color blocks
# --------------------------------------------------

color_blocks="on"
block_width=3
block_height=1
col_offset="auto"
bar_char_elapsed="-"
bar_char_total="="

# --------------------------------------------------
# Text Colors
# --------------------------------------------------

colors=(1 7 7 7 7 7)