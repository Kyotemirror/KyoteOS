[greeter]
# --- Background & Branding ---
background=/usr/share/backgrounds/kyoteos.png
logo=/usr/share/pixmaps/kyoteos.png

# Center the login box cleanly
position=50%,55%

# --- Theme ---
theme-name=Adwaita-dark
icon-theme-name=Adwaita
font-name=Sans 10

# --- UI Cleanliness ---
show-indicators=~host;~spacer;~clock;~spacer;~power
show-language-selector=false
show-session-selector=true
show-keyboard=false

# --- Performance / Behavior ---
clock-format=%H:%M
hide-user-image=true